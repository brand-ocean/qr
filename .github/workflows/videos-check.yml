name: videos-check

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  videos-check:
    name: YouTube Availability Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run YouTube availability check
        id: videos_check
        continue-on-error: true
        run: |
          pnpm videos:check \
            --report-json=artifacts/videos-check-report.json \
            --report-md=artifacts/videos-check-report.md

      - name: Publish report to workflow summary
        if: always()
        run: |
          if [ -f artifacts/videos-check-report.md ]; then
            cat artifacts/videos-check-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No markdown report generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Email daily report
        if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        env:
          MAILER_TOKEN: ${{ secrets.VIDEOS_REPORT_MAILER_TOKEN }}
        run: |
          run_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          if [ -f artifacts/videos-check-report.json ]; then
            total=$(jq -r '.summary.totalChecked' artifacts/videos-check-report.json)
            blocking=$(jq -r '.summary.blockingFailures' artifacts/videos-check-report.json)
            if [ "${{ steps.videos_check.outcome }}" = "success" ]; then
              subject="✅ Virals video-check: alle $total video's beschikbaar"
            else
              subject="❌ Virals video-check: $blocking van $total video's niet beschikbaar"
            fi
            body=$(cat artifacts/videos-check-report.md)
          else
            subject="⚠️ Virals video-check: geen rapport gegenereerd"
            body="De check kon geen rapport genereren."
          fi
          body="$body

          Volledige run: $run_url"
          jq -n --arg subject "$subject" --arg text "$body" '{subject: $subject, text: $text}' \
            | curl -fsS -X POST "https://viralsgame.nl/internal/videos-report" \
                -H "Authorization: Bearer $MAILER_TOKEN" \
                -H "Content-Type: application/json" \
                --data @-

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: videos-check-report
          path: artifacts/
          if-no-files-found: error

      - name: Enforce gate result
        if: steps.videos_check.outcome != 'success'
        run: exit 1
