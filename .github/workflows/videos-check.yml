name: videos-check

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  videos-check:
    name: YouTube Availability Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run YouTube availability check
        id: videos_check
        continue-on-error: true
        run: |
          pnpm videos:check \
            --report-json=artifacts/videos-check-report.json \
            --report-md=artifacts/videos-check-report.md

      - name: Publish report to workflow summary
        if: always()
        run: |
          if [ -f artifacts/videos-check-report.md ]; then
            cat artifacts/videos-check-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No markdown report generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Email daily report
        if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        env:
          MAILER_TOKEN: ${{ secrets.VIDEOS_REPORT_MAILER_TOKEN }}
        run: |
          report=artifacts/videos-check-report.json
          if [ -f "$report" ]; then
            total=$(jq -r '.summary.totalChecked' "$report")
            blocking=$(jq -r '.summary.blockingFailures' "$report")
            stale=$(jq -r '.summary.staleAllowlistEntries' "$report")
            allow=$(jq -r '[.allowlistedFailures[].cardId] | join(", ")' "$report")
            if [ "$blocking" = "0" ]; then
              subject="✅ Virals: alle $total video's werken"
              body="Alles werkt. Alle $total video's zijn beschikbaar."
            else
              if [ "$blocking" = "1" ]; then
                subject="❌ Virals: 1 video werkt niet"
                body="1 video werkt niet:"
              else
                subject="❌ Virals: $blocking video's werken niet"
                body="$blocking video's werken niet:"
              fi
              body="$body

          $(jq -r '.blockingFailures[] | "\(.cardId) → https://www.youtube.com/watch?v=\(.videoId) (\(.message))"' "$report")"
            fi
            if [ -n "$allow" ]; then
              body="$body

          Bewust genegeerd: $allow"
            fi
            if [ "$stale" != "0" ]; then
              body="$body

          Let op: $stale verouderde allowlist-regel(s) in config/videos-check-allowlist.json."
            fi
            body="$body

          Gecontroleerd: $total kaarten."
          else
            subject="⚠️ Virals video-check kon niet draaien"
            body="Er is geen rapport gegenereerd. Bekijk de run:
          $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          fi
          jq -n --arg subject "$subject" --arg text "$body" '{subject: $subject, text: $text}' \
            | curl -fsS -X POST "https://viralsgame.nl/internal/videos-report" \
                -H "Authorization: Bearer $MAILER_TOKEN" \
                -H "Content-Type: application/json" \
                --data @-

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: videos-check-report
          path: artifacts/
          if-no-files-found: error

      - name: Enforce gate result
        if: steps.videos_check.outcome != 'success'
        run: exit 1
